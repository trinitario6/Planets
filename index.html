<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#060818">
<title>Planet Crush!</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; touch-action:none; }
:root {
  --bg:    #060818;
  --bg2:   #0d1530;
  --bg3:   #121f45;
  --gold:  #ffd700;
  --accent:#7eb8ff;
  --cell:  44px;
  --cols:  8;
  --rows:  10;
}
html,body { width:100%; height:100%; overflow:hidden; background:var(--bg); font-family:'Segoe UI',system-ui,sans-serif; }

/* ── Deep space background ── */
#space-bg {
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(ellipse at 20% 30%, rgba(30,60,160,0.18) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 70%, rgba(80,20,140,0.14) 0%, transparent 55%),
    radial-gradient(ellipse at 50% 10%, rgba(10,30,100,0.2) 0%, transparent 50%),
    #060818;
}
.star { position:absolute; border-radius:50%; background:#fff; animation:twinkle var(--d,2s) ease-in-out infinite; }
@keyframes twinkle { 0%,100%{opacity:0.15;transform:scale(1);} 50%{opacity:1;transform:scale(1.4);} }
/* Nebula wisps */
.nebula { position:absolute; border-radius:50%; filter:blur(40px); pointer-events:none; }

#app { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; height:100dvh; padding:6px 8px 4px; gap:4px; }

/* ── Title ── */
#title {
  font-size:24px; font-weight:900; letter-spacing:4px; text-transform:uppercase;
  background:linear-gradient(135deg,#ffd700,#7eb8ff,#c084fc,#7eb8ff,#ffd700);
  background-size:300% auto;
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  animation:shimmer 4s linear infinite;
  filter:drop-shadow(0 0 12px rgba(126,184,255,0.5));
  line-height:1;
}
@keyframes shimmer { 0%{background-position:0%} 100%{background-position:300%} }

/* ── Header ── */
#header { width:100%; display:flex; justify-content:space-between; align-items:center; padding:2px 4px; }
.hbox { text-align:center; }
.hlabel { font-size:9px; color:#4a6a9a; letter-spacing:2px; text-transform:uppercase; }
.hval { font-size:22px; font-weight:700; color:#c8e0ff; line-height:1; }
.hval.gold { color:var(--gold); font-size:16px; }
#level-box { text-align:center; }
#level-label { font-size:9px; color:#4a6a9a; letter-spacing:2px; text-transform:uppercase; }
#level-val { font-size:22px; font-weight:700; color:#c084fc; line-height:1; }

/* ── Progress bar with rocket ── */
#progress-wrap {
  width:100%; height:14px;
  background:rgba(126,184,255,0.08);
  border-radius:7px;
  border:1px solid rgba(126,184,255,0.12);
  position:relative; overflow:visible;
}
#progress-bar {
  height:100%;
  background:linear-gradient(90deg,#3b6fd4,#7eb8ff,#c084fc);
  border-radius:7px; transition:width 0.5s ease; width:0%;
  box-shadow:0 0 8px rgba(126,184,255,0.5);
}
#progress-rocket {
  position:absolute;
  top:50%; transform:translateY(-50%) rotate(0deg);
  font-size:18px; line-height:1;
  transition:left 0.5s ease;
  pointer-events:none;
  filter:drop-shadow(0 0 6px rgba(255,200,100,0.9));
  left:0%;
}

/* ── Board ── */
#board-wrap { position:relative; }
#board {
  display:grid;
  grid-template-columns:repeat(var(--cols), var(--cell));
  grid-template-rows:repeat(var(--rows), var(--cell));
  gap:3px;
  background:rgba(126,184,255,0.04);
  border-radius:16px;
  padding:6px;
  border:1px solid rgba(126,184,255,0.1);
  box-shadow:0 0 50px rgba(60,100,200,0.25), inset 0 0 30px rgba(0,0,20,0.4);
}

/* ── Cells ── */
.cell {
  width:var(--cell); height:var(--cell);
  border-radius:50%;
  position:relative; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  font-size:calc(var(--cell)*0.56);
  line-height:1;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(126,184,255,0.07);
}
.cell.gem { border:none; }

/* Hint pulse for suggested move in kid mode */
.cell.hint svg {
  animation: hintPulse 0.7s ease infinite alternate;
}
@keyframes hintPulse {
  from { filter: drop-shadow(0 3px 6px rgba(0,0,0,0.5)); }
  to   { filter: drop-shadow(0 0 14px rgba(255,255,100,0.95)) drop-shadow(0 0 6px rgba(255,200,0,0.8)) brightness(1.35); }
}

/* Selected: glowing orbit ring */
.cell.selected {
  outline:2px solid #7eb8ff;
  outline-offset:2px;
  animation:orbit-pulse 0.6s ease infinite alternate;
}
@keyframes orbit-pulse {
  from { box-shadow:0 0 0 2px rgba(126,184,255,0.3); filter:brightness(1.1); }
  to   { box-shadow:0 0 0 6px rgba(126,184,255,0.6), 0 0 20px rgba(126,184,255,0.4); filter:brightness(1.4); }
}

.cell.matched { animation:planetGlow 0.22s ease forwards, planetBurst 0.32s 0.22s ease forwards; }
@keyframes planetGlow {
  0%   { transform:scale(1);    filter:brightness(1)   drop-shadow(0 0 0px white); }
  60%  { transform:scale(1.22); filter:brightness(2.8) drop-shadow(0 0 14px white) saturate(2); }
  100% { transform:scale(1.15); filter:brightness(2.2) drop-shadow(0 0 10px white) saturate(1.8); }
}
@keyframes planetBurst {
  0%   { transform:scale(1.15); filter:brightness(2.2) drop-shadow(0 0 10px white); opacity:1; }
  100% { transform:scale(0);    filter:brightness(3);  opacity:0; }
}

/* Drop-in for falling planets */
.cell.drop-in {
  animation: dropIn var(--drop-dur, 0.28s) cubic-bezier(0.22,1,0.36,1) forwards;
}
@keyframes dropIn {
  0%   { transform:translateY(var(--drop-from, -60px)); opacity:0.4; }
  70%  { transform:translateY(4px); opacity:1; }
  85%  { transform:translateY(-3px); }
  100% { transform:translateY(0); opacity:1; }
}

/* New planets entering from top */
.cell.enter-from-top {
  animation: enterTop var(--enter-dur, 0.32s) cubic-bezier(0.22,1,0.36,1) forwards;
  animation-delay: var(--enter-delay, 0s);
  opacity: 0;
}
@keyframes enterTop {
  0%   { transform:translateY(var(--enter-from, -80px)) scale(0.6); opacity:0; }
  65%  { transform:translateY(4px) scale(1.08); opacity:1; }
  80%  { transform:translateY(-2px) scale(0.98); }
  100% { transform:translateY(0) scale(1); opacity:1; }
}

.cell.invalid-swap { animation:wobble 0.32s ease; }
@keyframes wobble { 0%,100%{transform:rotate(0);} 25%{transform:rotate(-8deg);} 75%{transform:rotate(8deg);} }

/* ── Planet styles — base circles, SVG drawn inside ── */
.cell.gem { border:none; overflow:visible; background:transparent; }
.cell.gem svg { width:100%; height:100%; display:block; }
/* Each planet glows its own color */
.cell.p0 svg { filter: drop-shadow(0 2px 5px rgba(168,85,247,0.7)); }
.cell.p1 svg { filter: drop-shadow(0 2px 5px rgba(236,72,153,0.7)); }
.cell.p2 svg { filter: drop-shadow(0 2px 5px rgba(6,182,212,0.7)); }
.cell.p3 svg { filter: drop-shadow(0 2px 5px rgba(239,68,68,0.7)); }
.cell.p4 svg { filter: drop-shadow(0 2px 5px rgba(249,115,22,0.7)); }
.cell.p5 svg { filter: drop-shadow(0 2px 5px rgba(132,204,22,0.7)); }
.cell.selected { outline:none; animation:orbit-pulse 0.6s ease infinite alternate; }
@keyframes orbit-pulse {
  from { filter:brightness(1); }
  to   { filter:brightness(1.5) drop-shadow(0 0 14px rgba(255,255,255,0.9)); }
}

/* ── Score pop ── */
.score-pop {
  position:absolute; pointer-events:none; z-index:50;
  font-size:15px; font-weight:800; color:#7eb8ff;
  text-shadow:0 0 8px #7eb8ff;
  animation:floatUp 0.9s ease forwards; white-space:nowrap;
}
@keyframes floatUp { 0%{opacity:1;transform:translateY(0) scale(1);} 100%{opacity:0;transform:translateY(-55px) scale(1.3);} }

/* ── Board shake tiers ── */
#board-wrap.shake-sm { animation:shakeSm 0.3s ease; }
#board-wrap.shake-md { animation:shakeMd 0.4s ease; }
#board-wrap.shake-lg { animation:shakeLg 0.5s ease; }
#board-wrap.shake-epic { animation:shakeEpic 0.6s ease; }
@keyframes shakeSm  { 0%,100%{transform:translate(0,0);} 25%{transform:translate(-4px,2px);} 75%{transform:translate(4px,-2px);} }
@keyframes shakeMd  { 0%,100%{transform:translate(0,0);} 15%{transform:translate(-7px,3px);} 35%{transform:translate(7px,-3px);} 55%{transform:translate(-5px,2px);} 75%{transform:translate(5px,-2px);} }
@keyframes shakeLg  { 0%,100%{transform:translate(0,0);} 10%{transform:translate(-10px,4px) rotate(-1deg);} 30%{transform:translate(10px,-4px) rotate(1deg);} 50%{transform:translate(-8px,3px) rotate(-0.5deg);} 70%{transform:translate(8px,-3px) rotate(0.5deg);} 90%{transform:translate(-4px,1px);} }
@keyframes shakeEpic{ 0%,100%{transform:translate(0,0) scale(1);} 8%{transform:translate(-14px,6px) rotate(-2deg) scale(1.02);} 20%{transform:translate(14px,-6px) rotate(2deg) scale(0.98);} 35%{transform:translate(-10px,5px) rotate(-1.5deg);} 50%{transform:translate(12px,-4px) rotate(1.5deg);} 65%{transform:translate(-8px,3px) rotate(-1deg);} 80%{transform:translate(7px,-2px);} }

/* ── Special gems ── */
.cell.special-black-hole svg { filter: drop-shadow(0 0 10px rgba(180,0,255,0.9)) drop-shadow(0 0 20px rgba(100,0,200,0.7)) !important; }
.cell.special-pulsar svg     { filter: drop-shadow(0 0 10px rgba(255,200,50,0.9))  drop-shadow(0 0 20px rgba(255,150,0,0.7))  !important; }

/* ── Moves display ── */
#moves-wrap { width:100%; display:flex; align-items:center; justify-content:center; gap:6px; }
#moves-label { font-size:9px; color:#4a6a9a; letter-spacing:2px; text-transform:uppercase; }
#moves-count { font-size:22px; font-weight:800; color:#7eb8ff; min-width:26px; text-align:center; }

/* ── Big popup ── */
.big-popup {
  position:fixed; left:50%; top:38%;
  transform:translateX(-50%) scale(0);
  z-index:300; pointer-events:none;
  background:rgba(4,8,24,0.94);
  border:2px solid rgba(126,184,255,0.5);
  border-radius:30px; padding:10px 26px;
  white-space:nowrap;
  box-shadow:0 4px 40px rgba(0,0,0,0.9), 0 0 24px rgba(126,184,255,0.2);
  animation:bigPop 1.7s cubic-bezier(0.22,1,0.36,1) forwards;
}
.big-popup span {
  font-size:21px; font-weight:900;
  background:linear-gradient(135deg,#ffd700,#7eb8ff,#c084fc,#ffd700);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  filter:drop-shadow(0 0 6px rgba(126,184,255,0.5));
}
@keyframes bigPop {
  0%  {transform:translateX(-50%) scale(0) rotate(-5deg);opacity:0;}
  18% {transform:translateX(-50%) scale(1.18) rotate(2deg);opacity:1;}
  30% {transform:translateX(-50%) scale(0.96) rotate(-1deg);opacity:1;}
  60% {transform:translateX(-50%) scale(1) rotate(0);opacity:1;}
  80% {transform:translateX(-50%) scale(1) rotate(0);opacity:1;}
  100%{transform:translateX(-50%) scale(0.8) translateY(-22px);opacity:0;}
}

/* ── Mute btn ── */
#mute-btn {
  position:fixed; top:8px; right:10px; z-index:20;
  background:rgba(126,184,255,0.08); border:1px solid rgba(126,184,255,0.2);
  border-radius:20px; color:#7eb8ff; font-size:14px; padding:4px 10px; cursor:pointer;
}

/* ── Overlays ── */
.overlay {
  display:none; position:fixed; inset:0;
  background:rgba(2,5,18,0.92); z-index:200;
  flex-direction:column; align-items:center; justify-content:center; gap:18px;
}
.overlay.show { display:flex; }
.overlay h1 { font-size:30px; color:#7eb8ff; font-weight:900; letter-spacing:3px; }
.overlay .sub { font-size:15px; color:#4a6a9a; }
.overlay .sub span { color:#c8e0ff; font-weight:700; font-size:19px; }
.btn-row { display:flex; gap:12px; }
.ov-btn {
  padding:13px 30px; font-size:15px; font-weight:800;
  border:none; border-radius:30px; cursor:pointer; letter-spacing:1px;
}
.ov-btn.primary { background:linear-gradient(135deg,#2563eb,#7eb8ff); color:#fff; box-shadow:0 4px 20px rgba(126,184,255,0.4); }
.ov-btn.secondary { background:rgba(255,255,255,0.08); color:#aaa; border:1px solid rgba(255,255,255,0.15); }

/* ── Mode select ── */
#mode-screen {
  display:flex; position:fixed; inset:0;
  background:#060818; z-index:400;
  flex-direction:column; align-items:center; justify-content:center; gap:20px; padding:28px;
}
#mode-screen.hidden { display:none; }
.ms-title {
  font-size:28px; font-weight:900; letter-spacing:4px; text-transform:uppercase;
  background:linear-gradient(135deg,#ffd700,#7eb8ff,#c084fc);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  text-align:center;
}
.ms-planets {
  display:flex; gap:10px; font-size:28px;
  animation:orbitRow 8s linear infinite;
}
@keyframes orbitRow { 0%{transform:translateX(-8px);} 50%{transform:translateX(8px);} 100%{transform:translateX(-8px);} }
.ms-sub { font-size:13px; color:#4a6a9a; text-align:center; margin-top:-8px; }
.mode-btn {
  width:100%; max-width:280px; padding:18px 22px;
  border:none; border-radius:18px; cursor:pointer;
  display:flex; flex-direction:column; align-items:center; gap:5px;
  transition:transform 0.15s;
}
.mode-btn:active { transform:scale(0.97); }
.mode-btn-kid   { background:linear-gradient(135deg,#1e3a8a,#3b82f6); box-shadow:0 6px 24px rgba(59,130,246,0.4); }
.mode-btn-adult { background:linear-gradient(135deg,#4c1d95,#7c3aed); box-shadow:0 6px 24px rgba(124,58,237,0.4); }
.mode-btn .micon  { font-size:34px; line-height:1; }
.mode-btn .mlabel { font-size:20px; font-weight:900; color:#fff; text-shadow:0 1px 4px rgba(0,0,0,0.4); }
.mode-btn .mdesc  { font-size:11px; color:rgba(255,255,255,0.8); text-align:center; line-height:1.4; }
</style>

<body>

<div id="space-bg"></div>

<div id="app">
  <div id="title">Planet Crush!</div>
  <div id="header">
    <div class="hbox"><div class="hlabel">Score</div><div class="hval" id="score">0</div></div>
    <div id="level-box"><div id="level-label">Sector</div><div id="level-val">1</div></div>
    <div class="hbox"><div class="hlabel">Best</div><div class="hval gold" id="best">0</div></div>
  </div>
  <div id="progress-wrap">
    <div id="progress-bar"></div>
    <div id="progress-rocket">🚀</div>
  </div>
  <div id="board-wrap"><div id="board"></div></div>
  <div id="moves-wrap">
    <span id="moves-label">Moves Left</span>
    <span id="moves-count">20</span>
  </div>
</div>

<button id="mute-btn">🔊</button>

<div class="overlay" id="level-complete">
  <h1>🚀 SECTOR CLEAR!</h1>
  <div class="sub">Score: <span id="lc-score">0</span></div>
  <div class="btn-row">
    <button class="ov-btn primary" id="lc-next">Next Sector →</button>
  </div>
</div>

<div class="overlay" id="game-over">
  <h1>💀 LOST IN SPACE</h1>
  <div class="sub">Score: <span id="go-score">0</span></div>
  <div class="sub">Best: <span id="go-best">0</span></div>
  <div class="btn-row">
    <button class="ov-btn primary" id="go-restart">Try Again</button>
  </div>
</div>

<div id="mode-screen">
  <div class="ms-title">Planet Crush!</div>
  <div class="ms-planets">🌍 🪐 ☀️ 🌕 🔴 🟡</div>
  <div class="ms-sub">Choose your mission</div>
  <button class="mode-btn mode-btn-kid" id="btn-kid">
    <span class="micon">🌍</span>
    <span class="mlabel">Explorer</span>
    <span class="mdesc">More moves · Easier targets<br>Perfect for young astronauts!</span>
  </button>
  <button class="mode-btn mode-btn-adult" id="btn-adult">
    <span class="micon">🪐</span>
    <span class="mlabel">Commander</span>
    <span class="mdesc">Fewer moves · Harder targets<br>For seasoned space veterans!</span>
  </button>
</div>

<script>
// ═══ STARFIELD ════════════════════════════════════════════════════════════════
(function(){
  const wrap = document.createElement('div');
  wrap.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;';
  // Stars — varied sizes and brightness
  for (let i = 0; i < 90; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() < 0.08 ? Math.random() * 2 + 2 : Math.random() * 1.2 + 0.4;
    s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(Math.random()*4+1.5).toFixed(1)}s;animation-delay:${(Math.random()*5).toFixed(1)}s;opacity:${(Math.random()*0.5+0.3).toFixed(2)}`;
    wrap.appendChild(s);
  }
  // Nebula wisps
  const nebulaColors = [
    'rgba(30,80,200,0.06)','rgba(100,20,160,0.05)',
    'rgba(0,60,140,0.07)','rgba(60,0,120,0.05)',
  ];
  nebulaColors.forEach((c, i) => {
    const n = document.createElement('div');
    n.className = 'nebula';
    const s = 150 + Math.random() * 200;
    n.style.cssText = `width:${s}px;height:${s}px;left:${Math.random()*80}%;top:${Math.random()*80}%;background:${c};`;
    wrap.appendChild(n);
  });
  document.body.appendChild(wrap);
})();

// ═══ AUDIO ════════════════════════════════════════════════════════════════════
let audioCtx = null, muted = false;
function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function tone(freq, dur, vol=0.18, type='sine', startTime=0) {
  if (muted) return;
  try {
    const ctx = getCtx();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = type; o.frequency.value = freq;
    const t = ctx.currentTime + startTime;
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.start(t); o.stop(t + dur);
  } catch(e) {}
}

function noise(dur, vol, filterFreq, startTime=0) {
  if (muted) return;
  try {
    const ctx = getCtx();
    const sr = ctx.sampleRate;
    const buf = ctx.createBuffer(1, sr * dur, sr);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const filt = ctx.createBiquadFilter();
    filt.type = 'bandpass';
    filt.frequency.value = filterFreq;
    filt.Q.value = 0.8;
    const g = ctx.createGain();
    g.gain.setValueAtTime(vol, ctx.currentTime + startTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + startTime + dur);
    src.connect(filt); filt.connect(g); g.connect(ctx.destination);
    src.start(ctx.currentTime + startTime);
  } catch(e) {}
}

// Swap: soft double-blip
function soundSwap() {
  tone(480, 0.06, 0.1, 'sine', 0);
  tone(640, 0.05, 0.08, 'sine', 0.06);
}

// No match: low descending thud
function soundNoMatch() {
  tone(220, 0.18, 0.15, 'sawtooth', 0);
  tone(160, 0.14, 0.1, 'sawtooth', 0.08);
}

// Cascade 1 — delicate bell chime: pure sine tones, light and airy
function soundCascade1() {
  [1047, 1319, 1568].forEach((f, i) => tone(f, 0.25, 0.14, 'sine', i * 0.06));
}

// Cascade 2 — bright ring: higher harmonics, slightly fuller
function soundCascade2() {
  [784, 1047, 1319, 1568].forEach((f, i) => tone(f, 0.22, 0.17, 'sine', i * 0.055));
  tone(1047, 0.3, 0.08, 'triangle', 0.1);
}

// Cascade 3 — resonant gong: square wave with decay, deeper and meatier
function soundCascade3() {
  [523, 659, 784, 1047, 1319].forEach((f, i) => {
    tone(f, 0.3, 0.2, 'square', i * 0.05);
  });
  tone(261, 0.4, 0.15, 'sine', 0); // deep bass note underneath
  noise(0.2, 0.08, 2000, 0.1);     // subtle shimmer
}

// Cascade 4+ — full explosion: noise burst + descending bomb + impact crunch
function soundCascade4() {
  // Impact thud
  tone(80, 0.5, 0.35, 'sine', 0);
  tone(60, 0.4, 0.25, 'sine', 0.05);
  // Explosion noise burst — filtered white noise
  noise(0.4, 0.5, 800, 0);
  noise(0.3, 0.3, 300, 0.05);
  noise(0.25, 0.2, 150, 0.1);
  // Triumphant rising arp on top
  [440, 554, 659, 880, 1108].forEach((f, i) => tone(f, 0.2, 0.18, 'sawtooth', 0.05 + i * 0.06));
  // High shimmer tail
  [1568, 2093].forEach((f, i) => tone(f, 0.3, 0.1, 'sine', 0.2 + i * 0.05));
}

// Match sound — dispatches to the right cascade tier
function soundMatch(cascade) {
  if      (cascade <= 1) soundCascade1();
  else if (cascade === 2) soundCascade2();
  else if (cascade === 3) soundCascade3();
  else                    soundCascade4();
}

// Level up: majestic ascending fanfare
function soundLevelUp() {
  [523, 659, 784, 1047, 1319, 1568].forEach((f, i) => tone(f, 0.35, 0.22, 'sine', i * 0.09));
  tone(261, 0.6, 0.18, 'sine', 0);
  noise(0.15, 0.12, 1200, 0.3);
}

// Special gem activation: sci-fi zap
function soundSpecial() {
  tone(1200, 0.08, 0.28, 'square', 0);
  tone(800,  0.12, 0.22, 'square', 0.05);
  tone(400,  0.2,  0.18, 'sawtooth', 0.1);
  noise(0.18, 0.2, 1000, 0.05);
}

// ═══ GAME CONSTANTS ═══════════════════════════════════════════════════════════
const COLS = 8, ROWS = 10;
const PLANET_TYPES = 8;
// Special gem types (stored in gem.special)
const SPECIAL_BLACK_HOLE = 'black-hole'; // clears entire row + column
const SPECIAL_PULSAR     = 'pulsar';     // blasts 3x3 area around it

const LEVEL_TARGETS = [2000, 5000, 10000, 18000, 30000, 46000, 65000, 88000, 115000, 147000];
const BASE_MOVES = { kid: 30, adult: 20 };

let board = [];
let score = 0, best = 0, level = 1, movesLeft = 0, gameMode = 'adult';
let selectedCell = null;
let animating = false;
let _popToggle = 0;

// ═══ BOARD INIT ═══════════════════════════════════════════════════════════════
function randomPlanet() { return { type: Math.floor(Math.random() * PLANET_TYPES), special: null }; }

function initBoard() {
  board = Array.from({ length: ROWS }, () => Array.from({ length: COLS }, randomPlanet));
  let changed = true;
  while (changed) {
    changed = false;
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        while (
          (c >= 2 && board[r][c].type === board[r][c-1].type && board[r][c].type === board[r][c-2].type) ||
          (r >= 2 && board[r][c].type === board[r-1][c].type && board[r][c].type === board[r-2][c].type)
        ) { board[r][c] = randomPlanet(); changed = true; }
      }
    }
  }
}

function movesForLevel(lv) {
  const base = gameMode === 'kid' ? BASE_MOVES.kid : BASE_MOVES.adult;
  return Math.max(base - Math.floor((lv - 1) * 1.5), 8);
}
function targetForLevel(lv) {
  return LEVEL_TARGETS[Math.min(lv-1, LEVEL_TARGETS.length-1)] || LEVEL_TARGETS[LEVEL_TARGETS.length-1] + (lv-LEVEL_TARGETS.length)*10000;
}

// ═══ RENDER ═══════════════════════════════════════════════════════════════════
function renderBoard() {
  const el = document.getElementById('board');
  el.innerHTML = '';
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      el.appendChild(makeCell(r, c));
  attachBoardEvents();
}

// ─────────────────────────────────────────────────────────────────────────────
function makeCell(r, c) {
  const div = document.createElement('div');
  div.dataset.r = r; div.dataset.c = c;
  div.className = 'cell';
  const planet = board[r][c];
  if (planet) {
    div.classList.add('gem', 'p' + planet.type);
    if (planet.special) div.classList.add('special-' + planet.special);
    const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('viewBox', '0 0 40 40');
    svg.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
    svg.innerHTML = PLANET_SVG[planet.type]() + SPECIAL_OVERLAY_SVG[planet.special || '']();
    div.appendChild(svg);
  }
  return div;
}

  'pulsar': () => `
    <circle cx="20" cy="20" r="17" fill="rgba(255,180,0,0.3)"/>
    <circle cx="20" cy="20" r="12" fill="rgba(255,220,50,0.25)"/>
    <circle cx="20" cy="20" r="17" fill="none" stroke="rgba(255,220,50,0.9)" stroke-width="2.5"/>
    <circle cx="20" cy="20" r="12" fill="none" stroke="rgba(255,180,0,0.7)" stroke-width="1.5"/>
    <circle cx="20" cy="20" r="7"  fill="none" stroke="rgba(255,255,100,0.6)" stroke-width="1"/>
    <circle cx="20" cy="20" r="3"  fill="rgba(255,255,200,0.95)"/>
    <line x1="20" y1="1"  x2="20" y2="6"  stroke="rgba(255,230,50,0.85)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="20" y1="34" x2="20" y2="39" stroke="rgba(255,230,50,0.85)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="1"  y1="20" x2="6"  y2="20" stroke="rgba(255,230,50,0.85)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="34" y1="20" x2="39" y2="20" stroke="rgba(255,230,50,0.85)" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="5"  y1="5"  x2="9"  y2="9"  stroke="rgba(255,230,50,0.6)" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="35" y1="5"  x2="31" y2="9"  stroke="rgba(255,230,50,0.6)" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="5"  y1="35" x2="9"  y2="31" stroke="rgba(255,230,50,0.6)" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="35" y1="35" x2="31" y2="31" stroke="rgba(255,230,50,0.6)" stroke-width="1.2" stroke-linecap="round"/>`,
};

function updateCell(r, c) {
  const el = document.getElementById('board');
  const idx = r * COLS + c;
  const old = el.children[idx];
  if (!old) return;
  el.replaceChild(makeCell(r, c), old);
}

function updateScore() {
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent = best;
  document.getElementById('level-val').textContent = level;
  const target = targetForLevel(level);
  const pct = Math.min(score / target * 100, 100);
  document.getElementById('progress-bar').style.width = pct + '%';
  // Rocket tracks along the bar — clamp so it stays visible
  const rocket = document.getElementById('progress-rocket');
  if (rocket) rocket.style.left = Math.min(Math.max(pct, 2), 96) + '%';
}

function updateMoves() {
  document.getElementById('moves-count').textContent = movesLeft;
}

// ── Idle hint system (kid mode only) ─────────────────────────────────────────
let _hintTimer = null;
let _hintCell  = null;

function clearHint() {
  if (_hintCell !== null) {
    const el = document.getElementById('board')?.children[_hintCell];
    el?.classList.remove('hint');
    _hintCell = null;
  }
}

function resetHintTimer() {
  clearHint();
  clearTimeout(_hintTimer);
  if (gameMode !== 'kid' || animating) return;
  _hintTimer = setTimeout(showHint, 4000);
}

function showHint() {
  if (animating || gameMode !== 'kid') return;
  // Find a valid swap and highlight one of the two gems
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (c + 1 < COLS) {
        const t = board[r][c]; board[r][c] = board[r][c+1]; board[r][c+1] = t;
        const valid = findMatches().matched.size > 0;
        const t2 = board[r][c]; board[r][c] = board[r][c+1]; board[r][c+1] = t2;
        if (valid) {
          const idx = r * COLS + c;
          const el = document.getElementById('board')?.children[idx];
          el?.classList.add('hint');
          _hintCell = idx;
          return;
        }
      }
      if (r + 1 < ROWS) {
        const t = board[r][c]; board[r][c] = board[r+1][c]; board[r+1][c] = t;
        const valid = findMatches().matched.size > 0;
        const t2 = board[r][c]; board[r][c] = board[r+1][c]; board[r+1][c] = t2;
        if (valid) {
          const idx = r * COLS + c;
          const el = document.getElementById('board')?.children[idx];
          el?.classList.add('hint');
          _hintCell = idx;
          return;
        }
      }
    }
  }
}

// ═══ EVENTS ═══════════════════════════════════════════════════════════════════
let touchStart = null;
let touchStartXY = null;

function attachBoardEvents() {
  const el = document.getElementById('board');
  el.addEventListener('touchstart', onTouchStart, { passive: false });
  el.addEventListener('touchmove',  onTouchMove,  { passive: false });
  el.addEventListener('touchend',   onTouchEnd,   { passive: false });
  el.addEventListener('mousedown',  onMouseDown);
  el.addEventListener('mouseup',    onMouseUp);
}

function cellFromPoint(x, y) {
  const target = document.elementFromPoint(x, y);
  if (!target) return null;
  // Walk up DOM in case touch landed on a child (text, ::after etc.)
  const cell = target.closest('[data-r]');
  if (!cell) return null;
  return { r: +cell.dataset.r, c: +cell.dataset.c };
}

function onTouchStart(e) {
  e.preventDefault();
  clearHint(); clearTimeout(_hintTimer);
  const t = e.touches[0];
  touchStart = cellFromPoint(t.clientX, t.clientY);
  touchStartXY = { x: t.clientX, y: t.clientY };
}
function onTouchMove(e) { e.preventDefault(); }
function onTouchEnd(e) {
  e.preventDefault();
  if (!touchStart || animating) { touchStart = null; touchStartXY = null; return; }
  const t = e.changedTouches[0];
  const dx = t.clientX - (touchStartXY?.x || t.clientX);
  const dy = t.clientY - (touchStartXY?.y || t.clientY);
  const dist = Math.sqrt(dx*dx + dy*dy);

  if (dist < 12) {
    handleTap(touchStart.r, touchStart.c);
  } else {
    let tr = touchStart.r, tc = touchStart.c;
    if (Math.abs(dx) > Math.abs(dy)) {
      tc += dx > 0 ? 1 : -1;
    } else {
      tr += dy > 0 ? 1 : -1;
    }
    if (tr >= 0 && tr < ROWS && tc >= 0 && tc < COLS) {
      clearSelection();
      handleSwap(touchStart.r, touchStart.c, tr, tc);
    }
  }
  touchStart = null; touchStartXY = null;
}
let mouseDown = null;
let mouseDownXY = null;
function onMouseDown(e) {
  clearHint(); clearTimeout(_hintTimer);
  const cell = e.target.closest('[data-r]');
  mouseDown = cell ? { r: +cell.dataset.r, c: +cell.dataset.c } : null;
  mouseDownXY = { x: e.clientX, y: e.clientY };
}
function onMouseUp(e) {
  if (!mouseDown || animating) { mouseDown = null; return; }
  const dx = e.clientX - (mouseDownXY?.x || e.clientX);
  const dy = e.clientY - (mouseDownXY?.y || e.clientY);
  const dist = Math.sqrt(dx*dx + dy*dy);
  if (dist < 8) {
    handleTap(mouseDown.r, mouseDown.c);
  } else {
    let tr = mouseDown.r, tc = mouseDown.c;
    if (Math.abs(dx) > Math.abs(dy)) tc += dx > 0 ? 1 : -1;
    else tr += dy > 0 ? 1 : -1;
    if (tr >= 0 && tr < ROWS && tc >= 0 && tc < COLS) {
      clearSelection();
      handleSwap(mouseDown.r, mouseDown.c, tr, tc);
    }
  }
  mouseDown = null; mouseDownXY = null;
}
function handleTap(r, c) {
  if (!board[r][c]) return;
  if (selectedCell) {
    const { r: sr, c: sc } = selectedCell;
    if (sr === r && sc === c) { clearSelection(); return; }
    if (Math.abs(r-sr) + Math.abs(c-sc) === 1) { clearSelection(); handleSwap(sr, sc, r, c); return; }
    clearSelection();
  }
  selectCell(r, c);
}
function selectCell(r, c) {
  selectedCell = { r, c };
  document.getElementById('board').children[r * COLS + c]?.classList.add('selected');
}
function clearSelection() {
  if (!selectedCell) return;
  document.getElementById('board').children[selectedCell.r * COLS + selectedCell.c]?.classList.remove('selected');
  selectedCell = null;
}

// ═══ SWAP ════════════════════════════════════════════════════════════════════
async function handleSwap(r1, c1, r2, c2) {
  if (animating) return;
  if (!board[r1]?.[c1] || !board[r2]?.[c2]) return;
  animating = true;
  soundSwap();

  const tmp = board[r1][c1]; board[r1][c1] = board[r2][c2]; board[r2][c2] = tmp;
  updateCell(r1, c1); updateCell(r2, c2);

  const { matched: matches, specials } = findMatches();
  if (matches.size === 0) {
    await wait(110);
    const t2 = board[r1][c1]; board[r1][c1] = board[r2][c2]; board[r2][c2] = t2;
    updateCell(r1, c1); updateCell(r2, c2);
    const boardEl = document.getElementById('board');
    [r1*COLS+c1, r2*COLS+c2].forEach(i => {
      boardEl.children[i]?.classList.add('invalid-swap');
      setTimeout(() => boardEl.children[i]?.classList.remove('invalid-swap'), 320);
    });
    soundNoMatch();
    animating = false;
    resetHintTimer();
    return;
  }

  movesLeft--;
  updateMoves();
  await resolveMatches(matches, specials);
  checkGameState();
  animating = false;
  resetHintTimer();
}

// ═══ MATCH FINDING ════════════════════════════════════════════════════════════
// Returns { matched: Set of "r,c", specials: Map of "r,c" -> special type }
function findMatches() {
  const matched  = new Set();
  const specials = new Map();

  function processRun(cells, runType) {
    if (cells.length < 3 || runType === undefined || runType === null) return;
    cells.forEach(k => matched.add(k));
    if (cells.length >= 5) {
      specials.set(cells[Math.floor(cells.length / 2)], { type: runType, special: SPECIAL_BLACK_HOLE });
    } else if (cells.length === 4) {
      specials.set(cells[1], { type: runType, special: SPECIAL_PULSAR });
    }
  }

  // Horizontal runs — only start a run when we have a real non-special gem
  for (let r = 0; r < ROWS; r++) {
    let run = [], runType = null;
    for (let c = 0; c < COLS; c++) {
      const gem = board[r][c];
      if (gem && !gem.special) {
        if (gem.type === runType) {
          run.push(r + ',' + c);
        } else {
          processRun(run, runType);
          run = [r + ',' + c];
          runType = gem.type;
        }
      } else {
        // null or special cell — end current run
        processRun(run, runType);
        run = []; runType = null;
      }
    }
    processRun(run, runType);
  }

  // Vertical runs
  for (let c = 0; c < COLS; c++) {
    let run = [], runType = null;
    for (let r = 0; r < ROWS; r++) {
      const gem = board[r][c];
      if (gem && !gem.special) {
        if (gem.type === runType) {
          run.push(r + ',' + c);
        } else {
          processRun(run, runType);
          run = [r + ',' + c];
          runType = gem.type;
        }
      } else {
        processRun(run, runType);
        run = []; runType = null;
      }
    }
    processRun(run, runType);
  }

  return { matched, specials };
}

// ═══ RESOLVE MATCHES ══════════════════════════════════════════════════════════
async function resolveMatches(matches, specials) {
  let cascade = 0;
  while (matches.size > 0) {
    cascade++;
    const pts = matches.size * 10 * cascade;
    score += pts;
    if (score > best) { best = score; localStorage.setItem('planet_crush_best_' + gameMode, best); }
    updateScore();
    soundMatch(cascade);

    if (cascade === 2) {
      const t = _popToggle++ % 4;
      if (t === 0) showPopup('✨ Sebtacular! ✨');
      else if (t === 1) showPopup('💫 Lawsome! 💫');
      else if (t === 2) showPopup('🌟 Stellar! 🌟');
      else              showPopup('🪐 Out of this World! 🪐');
    }
    else if (cascade === 3) showPopup('💥 Siuperb! 💥');
    else if (cascade >= 4) showPopup('🚀 ORBITAL CRUSH! 🚀');

    showScorePop(pts);

    // Check if any matched cell is itself a special — trigger its extra effect
    const extraCells = new Set();
    matches.forEach(key => {
      const [r, c] = key.split(',').map(Number);
      const gem = board[r][c];
      if (!gem || !gem.special) return;
      if (gem.special === SPECIAL_BLACK_HOLE) {
        // Wipe entire row + column
        for (let cc = 0; cc < COLS; cc++) extraCells.add(r + ',' + cc);
        for (let rr = 0; rr < ROWS; rr++) extraCells.add(rr + ',' + c);
        showPopup('🌑 BLACK HOLE!');
        soundSpecial();
      } else if (gem.special === SPECIAL_PULSAR) {
        // Blast 3×3 around it
        for (let dr = -1; dr <= 1; dr++)
          for (let dc = -1; dc <= 1; dc++) {
            const nr = r + dr, nc = c + dc;
            if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) extraCells.add(nr + ',' + nc);
          }
        showPopup('⭐ PULSAR BLAST!');
        soundSpecial();
      }
    });
    extraCells.forEach(k => matches.add(k));

    const boardEl = document.getElementById('board');
    matches.forEach(key => {
      const [r, c] = key.split(',').map(Number);
      boardEl.children[r*COLS+c]?.classList.add('matched');
    });

    const wrap = document.getElementById('board-wrap');
    wrap.classList.remove('shake-sm','shake-md','shake-lg','shake-epic');
    void wrap.offsetWidth;
    const shakeClass = cascade >= 4 ? 'shake-epic'
                     : cascade === 3 ? 'shake-lg'
                     : cascade === 2 ? 'shake-md'
                     : matches.size >= 5 ? 'shake-sm'
                     : '';
    if (shakeClass) {
      wrap.classList.add(shakeClass);
      wrap.addEventListener('animationend', () => wrap.classList.remove('shake-sm','shake-md','shake-lg','shake-epic'), { once: true });
    }

    await wait(560);

    // Remove matched — but leave cells that should become specials
    matches.forEach(key => {
      const [r, c] = key.split(',').map(Number);
      if (specials?.has(key) && !extraCells.has(key)) {
        // Upgrade to special instead of removing
        const s = specials.get(key);
        board[r][c] = { type: s.type, special: s.special };
      } else {
        board[r][c] = null;
      }
    });

    await dropPlanetsAnimated();
    await fillGapsAnimated();

    // Re-find matches for next cascade
    const next = findMatches();
    matches  = next.matched;
    specials = next.specials;
  }
}

async function dropPlanetsAnimated() {
  const cellSize = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--cell')) || 40;
  const step = cellSize + 3; // cell + gap

  // Calculate how far each planet will drop
  const fallDist = {}; // key "r,c" -> pixels to fall
  for (let c = 0; c < COLS; c++) {
    let gapsBelow = 0;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (board[r][c] === null) {
        gapsBelow++;
      } else if (gapsBelow > 0) {
        fallDist[r + ',' + c] = gapsBelow * step;
      }
    }
  }

  // Move data in board array
  for (let c = 0; c < COLS; c++) {
    let empty = ROWS - 1;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (board[r][c] !== null) {
        if (empty !== r) { board[empty][c] = board[r][c]; board[r][c] = null; }
        empty--;
      }
    }
  }

  // Re-render board so DOM matches new positions
  const boardEl = document.getElementById('board');
  boardEl.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = makeCell(r, c);
      const dist = fallDist[r + ',' + c]; // original position that fell here
      // Find the original row that fell into this cell
      // dist > 0 means a planet fell from dist/step rows above
      if (board[r][c] !== null) {
        // Check if this cell received a dropped planet
        const origR = r - Math.round((fallDist[r+','+c] || 0) / step);
        const actualDist = fallDist[r+','+c];
        if (actualDist) {
          cell.classList.add('drop-in');
          cell.style.setProperty('--drop-from', `-${actualDist}px`);
          const dur = 0.2 + actualDist / step * 0.06;
          cell.style.setProperty('--drop-dur', dur.toFixed(2) + 's');
        }
      }
      boardEl.appendChild(cell);
    }
  }
  attachBoardEvents();

  await wait(320); // let drop animations play
}

async function fillGapsAnimated() {
  const cellSize = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--cell')) || 40;
  const step = cellSize + 3;

  // Fill nulls with new planets
  const newCells = []; // { r, c } of new planets
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (board[r][c] === null) {
        board[r][c] = randomPlanet();
        newCells.push({ r, c });
      }
    }
  }

  if (newCells.length === 0) return;

  const boardEl = document.getElementById('board');

  // For each new cell, apply enter-from-top animation staggered by column + how high it starts
  newCells.forEach(({ r, c }) => {
    const idx = r * COLS + c;
    const cell = makeCell(r, c);
    // Distance from top: planets highest up enter first, lower ones after
    const entryDist = (r + 1) * step;
    const delay = c * 0.02 + (1 - r / ROWS) * 0.05; // slight stagger by col and row
    cell.classList.add('enter-from-top');
    cell.style.setProperty('--enter-from', `-${entryDist}px`);
    cell.style.setProperty('--enter-dur', '0.35s');
    cell.style.setProperty('--enter-delay', delay.toFixed(3) + 's');
    boardEl.replaceChild(cell, boardEl.children[idx]);
  });
  attachBoardEvents();

  await wait(420); // let entry animations finish
}

// ═══ GAME STATE ═══════════════════════════════════════════════════════════════
function checkGameState() {
  if (score >= targetForLevel(level)) { setTimeout(() => triggerLevelComplete(), 300); return; }
  if (movesLeft <= 0) { setTimeout(() => triggerGameOver(), 300); return; }
  if (!hasValidMove()) {
    showPopup('🔀 Gravity shift!');
    setTimeout(() => { shuffleBoard(); renderBoard(); }, 650);
  }
}

function hasValidMove() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (c + 1 < COLS) {
        const t = board[r][c]; board[r][c] = board[r][c+1]; board[r][c+1] = t;
        if (findMatches().matched.size > 0) { const t2=board[r][c];board[r][c]=board[r][c+1];board[r][c+1]=t2; return true; }
        const t2=board[r][c];board[r][c]=board[r][c+1];board[r][c+1]=t2;
      }
      if (r + 1 < ROWS) {
        const t = board[r][c]; board[r][c] = board[r+1][c]; board[r+1][c] = t;
        if (findMatches().matched.size > 0) { const t2=board[r][c];board[r][c]=board[r+1][c];board[r+1][c]=t2; return true; }
        const t2=board[r][c];board[r][c]=board[r+1][c];board[r+1][c]=t2;
      }
    }
  }
  return false;
}

function shuffleBoard() {
  const planets = [];
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) planets.push(board[r][c]);
  planets.sort(() => Math.random() - 0.5);
  let i = 0;
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) board[r][c] = planets[i++];
}

function triggerLevelComplete() {
  soundLevelUp();
  document.getElementById('lc-score').textContent = score;
  document.getElementById('level-complete').classList.add('show');
}

function triggerGameOver() {
  document.getElementById('go-score').textContent = score;
  document.getElementById('go-best').textContent = best;
  document.getElementById('game-over').classList.add('show');
}

function nextLevel() {
  level++;
  movesLeft = movesForLevel(level);
  document.getElementById('level-complete').classList.remove('show');
  initBoard(); renderBoard(); updateScore(); updateMoves();
  showPopup('🌌 Sector ' + level + '!');
  resetHintTimer();
}

function startGame(mode) {
  gameMode = mode;
  score = 0; level = 1;
  best = parseInt(localStorage.getItem('planet_crush_best_' + mode) || '0');
  movesLeft = movesForLevel(1);
  document.getElementById('mode-screen').classList.add('hidden');
  document.getElementById('level-complete').classList.remove('show');
  document.getElementById('game-over').classList.remove('show');
  initBoard(); renderBoard(); updateScore(); updateMoves();
  resetHintTimer();
}

// ═══ POPUPS ═══════════════════════════════════════════════════════════════════
function showPopup(text) {
  document.querySelectorAll('.big-popup').forEach(el => el.remove());
  const pop = document.createElement('div');
  pop.className = 'big-popup';
  const span = document.createElement('span');
  span.textContent = text;
  pop.appendChild(span);
  document.body.appendChild(pop);
  pop.addEventListener('animationend', () => pop.remove());
}

function showScorePop(pts) {
  const wrap = document.getElementById('board-wrap');
  const pop = document.createElement('div');
  pop.className = 'score-pop';
  pop.textContent = '+' + pts;
  pop.style.top  = (20 + Math.random() * 60) + '%';
  pop.style.left = (20 + Math.random() * 60) + '%';
  wrap.appendChild(pop);
  pop.addEventListener('animationend', () => pop.remove());
}

// ═══ UTILS ════════════════════════════════════════════════════════════════════
function wait(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

function setResponsiveSize() {
  const vw = window.innerWidth - 20;
  // Reserve space for: title~28, header~36, progress~14, moves~22, gaps~30 = ~130px
  const vh = window.innerHeight - 130;
  // Board is 8 wide × 10 tall — fit whichever axis is tighter
  const cellByWidth  = Math.floor((vw      - 12 - 7 * 3) / 8);   // 8 cols + gap
  const cellByHeight = Math.floor((vh      - 12 - 9 * 3) / 10);  // 10 rows + gap
  const cell = Math.min(cellByWidth, cellByHeight);
  document.documentElement.style.setProperty('--cell', Math.max(cell, 26) + 'px');
}

// ═══ WIRING ═══════════════════════════════════════════════════════════════════
document.getElementById('btn-kid').addEventListener('click',    () => startGame('kid'));
document.getElementById('btn-adult').addEventListener('click',  () => startGame('adult'));
document.getElementById('lc-next').addEventListener('click',    nextLevel);
document.getElementById('go-restart').addEventListener('click', () => {
  document.getElementById('game-over').classList.remove('show');
  document.getElementById('mode-screen').classList.remove('hidden');
});

window.addEventListener('resize', () => { setResponsiveSize(); renderBoard(); });
setResponsiveSize();
